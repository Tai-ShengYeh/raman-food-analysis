<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>重點1：拉曼 vs FTIR — 選擇題</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;padding:16px}
.container{max-width:600px;margin:0 auto}
.header{text-align:center;padding:20px 0 10px}
.kicker{font-size:12px;letter-spacing:0.15em;color:#38bdf8;text-transform:uppercase;margin-bottom:6px;font-family:monospace}
h1{font-size:22px;font-weight:900;color:#fff;margin-bottom:4px}
.subtitle{font-size:13px;color:#94a3b8;margin-bottom:20px}
.progress-bar{height:4px;background:#1e293b;border-radius:2px;margin-bottom:20px}
.progress-fill{height:100%;background:linear-gradient(90deg,#38bdf8,#818cf8);border-radius:2px;transition:width .4s}
.score-badge{display:inline-block;background:#1e293b;border:1px solid #334155;border-radius:20px;padding:4px 14px;font-size:13px;color:#94a3b8;margin-bottom:16px}
.question-card{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:20px;margin-bottom:16px}
.q-num{font-size:11px;color:#38bdf8;font-family:monospace;letter-spacing:0.1em;margin-bottom:8px}
.q-text{font-size:16px;font-weight:700;line-height:1.5;color:#f1f5f9;margin-bottom:16px}
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{background:#0f172a;border:1.5px solid #334155;border-radius:10px;padding:12px 16px;font-size:14px;color:#cbd5e1;text-align:left;cursor:pointer;transition:all .2s;min-height:44px;line-height:1.4}
.opt-btn:hover:not(:disabled){border-color:#38bdf8;color:#e2e8f0;background:#162032}
.opt-btn.correct{border-color:#22c55e;background:rgba(34,197,94,0.12);color:#86efac}
.opt-btn.wrong{border-color:#ef4444;background:rgba(239,68,68,0.10);color:#fca5a5}
.opt-btn.reveal{border-color:#22c55e;background:rgba(34,197,94,0.06);color:#86efac;opacity:.8}
.feedback{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:14px;line-height:1.5}
.feedback.ok{background:rgba(34,197,94,0.1);border:1px solid rgba(34,197,94,0.3);color:#86efac}
.feedback.bad{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.3);color:#fca5a5}
.next-btn{display:none;width:100%;margin-top:14px;padding:12px;background:#38bdf8;border:none;border-radius:10px;font-size:15px;font-weight:700;color:#0f172a;cursor:pointer;transition:opacity .2s}
.next-btn:hover{opacity:.85}
.result-card{display:none;text-align:center;background:#1e293b;border:1px solid #334155;border-radius:16px;padding:28px 20px;margin-top:8px}
.result-card .big{font-size:52px;margin-bottom:8px}
.result-card h2{font-size:22px;font-weight:900;color:#fff;margin-bottom:6px}
.result-card p{font-size:14px;color:#94a3b8;margin-bottom:20px}
.restart-btn{padding:12px 32px;background:#38bdf8;border:none;border-radius:10px;font-size:15px;font-weight:700;color:#0f172a;cursor:pointer}
.qr-section{text-align:center;margin-top:24px;padding:16px;background:#1e293b;border-radius:12px;border:1px solid #334155}
.qr-section p{font-size:12px;color:#64748b;margin-top:8px}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="kicker">Raman Spectroscopy · 形成性評量</div>
    <h1>重點1：拉曼 vs FTIR 比較</h1>
    <div class="subtitle">選擇題 · 4 題 · 食品化學研究生版</div>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="pbar" style="width:0%"></div></div>
  <div class="score-badge">得分：<span id="score">0</span> / <span id="total">4</span> ｜ 第 <span id="qnum">1</span> 題</div>
  <div id="game-area"></div>
  <div class="result-card" id="result">
    <div class="big" id="res-emoji">🎉</div>
    <h2 id="res-title">完成！</h2>
    <p id="res-msg"></p>
    <button class="restart-btn" onclick="restart()">重新挑戰</button>
  </div>
  <div class="qr-section">
    <img id="qr-img" width="120" height="120" alt="QR Code" style="border-radius:8px">
    <p>掃描開啟此遊戲</p>
  </div>
</div>
<script>
const Qs = [
  {q:"下列哪個特性是拉曼光譜在食品分析上優於 FTIR 的核心優勢？",
   opts:["可使用更強的光源，提高訊號強度","水分子不會產生強烈的拉曼散射，幾乎不干擾訊號","拉曼光譜的價格比 FTIR 低很多","拉曼光譜不需要雷射光源"],
   ans:1,exp:"水是紅外線的強吸收體（OH 伸縮 ~3400 cm⁻¹ 蓋掉訊號），但水是極弱的拉曼散射體，因此含水食品可直接用拉曼分析，這是拉曼對比 FTIR 的核心優勢。"},
  {q:"為什麼拉曼光譜可以「透過包裝」直接掃描食品？",
   opts:["拉曼使用的紅外線可穿透所有材料","可見~近紅外雷射能穿透透明塑膠/玻璃，散射光由同一物鏡採集","拉曼儀器有特殊的 X 射線功能","包裝材料對拉曼訊號有放大效果"],
   ans:1,exp:"拉曼通常使用 785 nm 或 1064 nm 的可見~近紅外雷射，這些波長的光可穿透 PET、PE、玻璃等透明包裝材料，不需要開封就能掃描內容物。"},
  {q:"以下哪種情況下，拉曼光譜的表現可能比 FTIR 差？",
   opts:["分析含水食品時","分析固體樣品時","分析含高螢光有機物的樣品（如某些蜂蜜、橄欖油）時","透過玻璃瓶分析液態樣品時"],
   ans:2,exp:"複雜食品基質中含有的有機物（多酚、色素等）可能產生強烈螢光，其訊號會蓋過微弱的拉曼散射訊號。選用 1064 nm 雷射可降低此問題，但 FTIR 不受螢光干擾。"},
  {q:"拉曼偏移（Raman shift, Δν）在分析上的意義是什麼？",
   opts:["反映入射雷射的波長","Δν 與入射雷射波長無關，只反映分子特定化學鍵的振動能量，是分子的「結構指紋」","代表散射光的絕對波數","反映樣品的溫度變化"],
   ans:1,exp:"拉曼偏移（cm⁻¹）= 1/λ_laser − 1/λ_scattered，是入射光與散射光波數之差，只對應分子內部的振動模式，與入射雷射波長無關。因此，無論用 532 nm 還是 785 nm 雷射，同一分子的特徵峰位相同——這是分子指紋的核心原理。"},
];
let cur=0,score=0;
function render(){
  if(cur>=Qs.length){showResult();return}
  const q=Qs[cur];
  document.getElementById('qnum').textContent=cur+1;
  document.getElementById('pbar').style.width=((cur)/Qs.length*100)+'%';
  let html=`<div class="question-card">
    <div class="q-num">Q ${cur+1} / ${Qs.length}</div>
    <div class="q-text">${q.q}</div>
    <div class="options">`;
  q.opts.forEach((o,i)=>{html+=`<button class="opt-btn" onclick="pick(${i})">${o}</button>`});
  html+=`</div><div class="feedback" id="fb" style="display:none"></div>
  <button class="next-btn" id="nb" onclick="next()">下一題 →</button></div>`;
  document.getElementById('game-area').innerHTML=html;
}
function pick(i){
  const q=Qs[cur];
  const btns=document.querySelectorAll('.opt-btn');
  btns.forEach(b=>b.disabled=true);
  const fb=document.getElementById('fb');
  const nb=document.getElementById('nb');
  if(i===q.ans){
    btns[i].classList.add('correct');
    fb.className='feedback ok';
    fb.innerHTML='✅ 正確！'+q.exp;
    score++;
    document.getElementById('score').textContent=score;
  } else {
    btns[i].classList.add('wrong');
    btns[q.ans].classList.add('reveal');
    fb.className='feedback bad';
    fb.innerHTML='❌ 再想想！正確答案：<strong>'+q.opts[q.ans]+'</strong><br>'+q.exp;
  }
  fb.style.display='block';
  nb.style.display='block';
}
function next(){cur++;render()}
function showResult(){
  document.getElementById('game-area').innerHTML='';
  document.getElementById('pbar').style.width='100%';
  const r=document.getElementById('result');
  r.style.display='block';
  const pct=score/Qs.length;
  document.getElementById('res-emoji').textContent=pct>=.75?'🎉':pct>=.5?'😊':'💪';
  document.getElementById('res-title').textContent='答對 '+score+' / '+Qs.length;
  document.getElementById('res-msg').textContent=pct>=.75?'優秀！拉曼 vs FTIR 的差異掌握得很清楚。':pct>=.5?'不錯！再複習一次透包裝掃描的原理吧。':'繼續加油！建議重看投影片第 2 頁再挑戰。';
}
function restart(){cur=0;score=0;document.getElementById('score').textContent=0;document.getElementById('result').style.display='none';render()}
render();
document.getElementById('qr-img').src='https://api.qrserver.com/v1/create-qr-code/?size=120x120&data='+encodeURIComponent(window.location.href);
</script>
</body>
</html>
